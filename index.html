<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>היסוד הסודי - משחק כימיה</title>


<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#512da8,#0097a7);
margin:0;
padding:20px;
direction:rtl;
}


.container{
max-width:950px;
margin:auto;
background:white;
border-radius:25px;
padding:30px;
box-shadow:0 10px 30px #555;
}


h1{
text-align:center;
font-size:42px;
color:#512da8;
}


.subtitle{
text-align:center;
font-size:20px;
line-height:1.6;
}


button{

display:block;
margin:20px auto;
padding:15px 35px;
border:none;
border-radius:30px;
background:#512da8;
color:white;
font-size:20px;
cursor:pointer;

}


button:hover{
background:#311b92;
}


.screen{
display:none;
}


.active{
display:block;
}


.elements{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:12px;

}


.element{

background:#e0f7fa;
border:2px solid #0097a7;
border-radius:15px;
padding:12px;
text-align:center;

}


.symbol{

font-size:28px;
font-weight:bold;
color:#512da8;

}


.name{

font-size:17px;

}


.info-box{

background:#f3e5f5;
border-radius:20px;
padding:20px;
line-height:1.7;
font-size:18px;

}


.question{

background:#e8f5e9;
border-radius:20px;
padding:25px;
text-align:center;
font-size:25px;

}


.answer{

display:inline-block;
margin:15px;
background:#0097a7;

}


footer{

text-align:center;
margin-top:25px;
color:#777;

}


</style>

</head>



<body>


<div class="container">


<h1>🔬 היסוד הסודי 🔬</h1>



<!-- מסך פתיחה -->

<div id="start" class="screen active">


<p class="subtitle">

בחרו יסוד בלב (אין צורך ללחוץ עליו).<br>

קראו את המידע הקצר עליו,<br>

והמחשב ינסה לגלות איזה יסוד בחרתם.

</p>



<button onclick="openInfo()">

📚 מידע על היסודות

</button>



<h2>רשימת היסודות במשחק:</h2>


<div id="elementList" class="elements">

</div>



<button onclick="startGame()">

🚀 התחלת המשחק

</button>


</div>





<!-- מסך מידע -->

<div id="information" class="screen">


<div class="info-box" id="infoText">

</div>



<button onclick="backStart()">

חזרה לרשימת היסודות

</button>


</div>





<!-- מסך משחק -->

<div id="game" class="screen">


<div class="question" id="question">

</div>


<button class="answer" onclick="answer(true)">
✅ כן
</button>


<button class="answer" onclick="answer(false)">
❌ לא
</button>



</div>





<!-- מסך תוצאה -->

<div id="result" class="screen">


<div class="info-box" id="resultText">

</div>


<button onclick="startGame()">

🔄 משחק חדש

</button>


</div>



<footer>

עריכה: מילכה ברקו גרש

</footer>



</div>

// ===============================
// הפעלת הרשימה במסך הפתיחה
// ===============================


function createElementList(){

let box=document.getElementById("elementList");

box.innerHTML="";


elements.forEach(e=>{


box.innerHTML += `

<div class="element">

<div class="symbol">${e.symbol}</div>

<div class="name">${e.name}</div>

</div>

`;

});


}




// ===============================
// הצגת מידע על היסודות
// ===============================


function openInfo(){


let box=document.getElementById("infoText");


box.innerHTML="<h2>מידע קצר על היסודות במשחק</h2>";


elements.forEach(e=>{


box.innerHTML +=

`

<h3>${e.name} (${e.symbol})</h3>

<p>
מספר אטומי: ${e.number}<br>
${e.summary}
</p>

<hr>

`;


});


showScreen("information");


}




// ===============================
// מעבר בין מסכים
// ===============================


function showScreen(id){


document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));


document.getElementById(id)
.classList.add("active");


}




function backStart(){

showScreen("start");

}




// ===============================
// מנוע המשחק
// ===============================


let remaining=[];

let currentQuestion=null;



function startGame(){


remaining=[...elements];

showScreen("game");

askQuestion();


}




// שאלות ברורות לתלמידים

const questions=[


{
text:"האם היסוד הוא גז בטמפרטורת החדר?",
yes:["מימן","הליום","חנקן","חמצן","ניאון","ארגון"],
},


{
text:"האם היסוד הוא מרכיב חשוב בעצמות ובשיניים?",
yes:["סידן","זרחן"],
},


{
text:"האם היסוד הוא מרכיב חשוב בדם?",
yes:["ברזל"],
},


{
text:"האם היסוד משמש בסוללות נטענות?",
yes:["ליתיום","קובלט","ניקל"],
},


{
text:"האם היסוד משמש בחוטי חשמל?",
yes:["נחושת"],
},


{
text:"האם היסוד משמש בתכשיטים יקרים?",
yes:["זהב","כסף","פלטינה"],
},


{
text:"האם היסוד משמש בשבבים אלקטרוניים?",
yes:["צורן"],
},


{
text:"האם היסוד נמצא במלח הבישול?",
yes:["נתרן","כלור"],
}


];





function askQuestion(){


if(remaining.length===1){

showResult(remaining[0]);

return;

}



let possible=questions.filter(q=>{


let yes=remaining.filter(e=>q.yes.includes(e.name)).length;

let no=remaining.length-yes;


return yes>0 && no>0;


});



if(possible.length===0){

showResult(remaining[0]);

return;

}



currentQuestion=
possible[Math.floor(Math.random()*possible.length)];



document.getElementById("question").innerHTML=

currentQuestion.text;


}




function answer(value){


if(value){


remaining=

remaining.filter(e=>

currentQuestion.yes.includes(e.name)

);


}

else{


remaining=

remaining.filter(e=>

!currentQuestion.yes.includes(e.name)

);


}



askQuestion();


}




// ===============================
// הצגת תשובה סופית
// ===============================


function showResult(e){


document.getElementById("resultText").innerHTML=

`

<h2>🎉 המחשב גילה!</h2>

<h1>${e.name} (${e.symbol})</h1>

<p>
מספר אטומי: ${e.number}
</p>

<p>
${e.summary}
</p>

`;


showScreen("result");


}



// ===============================
// הפעלה ראשונית
// ===============================


createElementList();


</script>

</html>
