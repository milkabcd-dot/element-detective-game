<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>היסוד הסודי - משחק כימיה</title>

<style>

* {
  box-sizing: border-box;
}

body {
  font-family: Arial, "Segoe UI", sans-serif;
  background: linear-gradient(135deg,#512da8,#0097a7);
  min-height:100vh;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  background:white;
  max-width:900px;
  width:100%;
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 30px #333;
}

h1 {
  text-align:center;
  color:#512da8;
  font-size:40px;
}

.subtitle {
  text-align:center;
  font-size:20px;
  color:#555;
}

.screen {
  display:none;
}

.active {
  display:block;
}


.elements-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:12px;
  margin:20px 0;
}


.element {
  border:3px solid #0097a7;
  border-radius:15px;
  padding:10px;
  text-align:center;
  background:#f5ffff;
}


.symbol {
  font-size:30px;
  font-weight:bold;
  color:#512da8;
}


.name {
  font-size:16px;
}


button {

  border:none;
  border-radius:30px;
  padding:15px 35px;
  font-size:20px;
  cursor:pointer;
}


.start {
  display:block;
  margin:auto;
  background:#512da8;
  color:white;
}


.question {
  background:#f3f8ff;
  border:3px dashed #512da8;
  border-radius:20px;
  padding:30px;
  text-align:center;
  font-size:28px;
}


.answers {
  text-align:center;
  margin-top:20px;
}


.yes {
 background:#27ae60;
 color:white;
 margin:10px;
}


.no {
 background:#e74c3c;
 color:white;
 margin:10px;
}


.progress {
 text-align:center;
 font-size:22px;
 margin:20px;
}


.result {
 text-align:center;
 background:#fff8dc;
 border-radius:20px;
 padding:30px;
}


.credit {
 text-align:center;
 margin-top:25px;
 color:#777;
 font-size:14px;
}


table {
 width:100%;
 border-collapse:collapse;
}

td,th {
 border:1px solid #ccc;
 padding:8px;
 text-align:center;
}


.modal {
 display:none;
 position:fixed;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:#0008;
}


.modal-content {
 background:white;
 margin:5%;
 padding:20px;
 border-radius:20px;
 max-height:80vh;
 overflow:auto;
}


</style>

</head>


<body>


<div class="container">


<h1>🔬 היסוד הסודי 🔬</h1>

<p class="subtitle">
בחרו יסוד בלב מתוך הרשימה.<br>
קראו עליו בטבלת העזר, למדו עליו כמה פרטים,<br>
וענו על שאלות כן/לא.<br>
המחשב ינסה לגלות איזה יסוד בחרתם!
</p>



<div id="intro" class="screen active">

<button onclick="openTable()">
📚 טבלת מידע על היסודות
</button>


<div id="elements" class="elements-grid"></div>


<button class="start" onclick="startGame()">
🚀 מתחילים
</button>


</div>



<div id="game" class="screen">


<div class="progress">
נשארו:
<span id="count"></span>
יסודות
</div>


<div class="question">

<div id="questionText">
</div>


<div class="answers">

<button class="yes" onclick="answer(true)">
✔ כן
</button>


<button class="no" onclick="answer(false)">
✘ לא
</button>


</div>

</div>



<div id="gameElements" class="elements-grid"></div>


</div>




<div id="result" class="screen">


<div class="result">

<h2>מצאתי!</h2>

<h1 id="resultName"></h1>


<p>
סימול:
<span id="resultSymbol"></span>
</p>


<p id="resultUse"></p>


<button class="start" onclick="restart()">
🔄 משחק חדש
</button>


</div>


</div>


<div class="credit">
עריכה: מילכה ברקו גרש
</div>


</div>



<div id="modal" class="modal">

<div class="modal-content">

<button onclick="closeTable()">סגור</button>

<h2>טבלת עזר</h2>

<table id="infoTable"></table>


</div>

</div>



<script>
    // ===============================
// מאגר יסודות
// ===============================

const elements = [

{

metal:false
},

{

air:true,
blood:false,
bones:false,
electric:false,
magnet:false,
metal:false
},

{
name:"ארגון",
symbol:"Ar",
number:18,
use:"משמש למילוי נורות ולריתוך מתכות",
air:true,

},

{
name:"ברזל",

number:26,
use:"מרכיב חשוב בהמוגלובין שבדם ומשמש לייצור פלדה",
air:false,

magnet:true,
metal:true
},

{
name:"סידן",

},

{
name:"נחושת",

magnet:false,

},

{
name:"אלומיניום",
symbol:"Al",
number:13,
use:"משמש לייצור פחיות, מטוסים ומוצרי מטבח",

blood:false,
bones:false,
electric:true,

metal:true
},

{
name:"זהב",
symbol:"Au",
number:79,
use:"משמש לתכשיטים ולרכיבים אלקטרוניים",

},

{
name:"ליתיום",
symbol:"Li",
number:3,
use:"משמש בסוללות נטענות של טלפונים ומכוניות חשמליות",

bones:false,
electric:false,

},

{
name:"כלור",
symbol:"Cl",
number:17,
use:"משמש לחיטוי מים ובריכות",

},

name:"פחמן",

use:"הבסיס לחומרים אורגניים כמו יצורים חיים",
air:false,

metal:false
},

{
name:"מגנזיום",
symbol:"Mg",
number:12,
use:"משמש בזיקוקים ובסגסוגות קלות",
air:false,
blood:false,
bones:false,
electric:false,
magnet:false,
metal:true
},

{
name:"צורן",
symbol:"Si",
number:14,
use:"משמש לייצור שבבים אלקטרוניים ופאנלים סולריים",
air:false,
blood:false,
bones:false,
electric:true,
magnet:false,
metal:false
},

{
name:"ניקל",
symbol:"Ni",
number:28,
use:"משמש בסוללות ובפלדת אל-חלד",
air:false,
blood:false,
bones:false,
electric:false,
magnet:true,
metal:true
},

{
name:"קובלט",
symbol:"Co",
number:27,
use:"משמש בסוללות וביצירת צבעים כחולים",
air:false,
blood:false,
bones:false,
electric:false,
magnet:true,
metal:true
}

];


// ===============================
// שאלות ברורות לתלמידים
// ===============================


const questions=[

{
text:"האם היסוד הוא מרכיב חשוב בעצמות ובשיניים?",
check:e=>e.bones
},

{
text:"האם היסוד הוא מרכיב חשוב בהמוגלובין שבדם?",
check:e=>e.blood
},

{
text:"האם היסוד נמצא בכמות גדולה באוויר שאנו נושמים?",
check:e=>e.air
},

{
text:"האם היסוד משמש להעברת חשמל בחוטים?",
check:e=>e.electric
},

{
text:"האם היסוד נמשך למגנט?",
check:e=>e.magnet
},

{
text:"האם היסוד הוא מתכת?",
check:e=>e.metal
}

];



// ===============================
// מנגנון המשחק
// ===============================


let remaining=[];
let currentQuestion;



function showElements(id,list){

let div=document.getElementById(id);

div.innerHTML="";


list.forEach(e=>{

div.innerHTML+=`

<div class="element">

<div class="symbol">
${e.symbol}
</div>

<div class="name">
${e.name}
</div>

</div>

`;

});

}



function startGame(){

remaining=[...elements];

document.getElementById("intro").classList.remove("active");

document.getElementById("game").classList.add("active");

showElements("gameElements",remaining);

nextQuestion();

}



function nextQuestion(){

if(remaining.length<=1){

showResult(remaining[0]);

return;

}


currentQuestion=
questions.find(q=>{

let yes=remaining.filter(q.check).length;

return yes>0 && yes<remaining.length;

});


if(!currentQuestion){

showResult(remaining[0]);

return;

}


document.getElementById("questionText").innerHTML=
currentQuestion.text;


document.getElementById("count").innerHTML=
remaining.length;


}



function answer(value){


remaining=
remaining.filter(e=>
currentQuestion.check(e)==value
);


showElements("gameElements",remaining);


nextQuestion();


}



function showResult(e){


document.getElementById("game").classList.remove("active");

document.getElementById("result").classList.add("active");


document.getElementById("resultName").innerHTML=
e.name+" ("+e.symbol+")";


document.getElementById("resultSymbol").innerHTML=
e.number;


document.getElementById("resultUse").innerHTML=
"💡 "+e.use;


}



function restart(){

document.getElementById("result").classList.remove("active");

document.getElementById("intro").classList.add("active");

}



// ===============================
// טבלת מידע
// ===============================


function openTable(){

let table=document.getElementById("infoTable");


table.innerHTML=
`
<tr>
<th>יסוד</th>
<th>סימול</th>
<th>מספר אטומי</th>
<th>שימוש מרכזי</th>
</tr>
`;


elements.forEach(e=>{

table.innerHTML+=`

<tr>
<td>${e.name}</td>
<td>${e.symbol}</td>
<td>${e.number}</td>
<td>${e.use}</td>
</tr>

`;

});


document.getElementById("modal").style.display="block";

}



function closeTable(){

document.getElementById("modal").style.display="none";

}



// טעינה ראשונית

showElements("elements",elements);
