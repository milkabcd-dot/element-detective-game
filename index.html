<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון היסודות הכימיים</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --background: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--secondary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-box {
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background-color: #f1f2f6;
            border: 2px solid #dcdde1;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #dfe4ea;
            border-color: var(--secondary);
        }

        .option-btn.correct {
            background-color: #2ed573 !important;
            color: white;
            border-color: #26af5f !important;
        }

        .option-btn.wrong {
            background-color: var(--accent) !important;
            color: white;
            border-color: #c0392b !important;
        }

        .info-card {
            background-color: #f1f8ff;
            border-right: 5px solid var(--secondary);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .next-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        .score-screen {
            text-align: center;
            display: none;
        }

        .score-screen h2 {
            font-size: 2rem;
            color: var(--primary);
        }

        .restart-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .restart-btn:hover {
            background-color: #1a252f;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            border-top: 1px solid #eaeaea;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>חידון היסודות הכימיים</h1>
        <p>בדקו את הידע שלכם על יסודות הטבע, תכונותיהם ושימושיהם!</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </header>

    <main>
        <div id="quizContainer" class="quiz-box">
            <div id="questionText" class="question-text">טוען שאלה...</div>
            <div id="optionsGrid" class="options-grid"></div>
            <div id="infoCard" class="info-card"></div>
            <button id="nextBtn" class="next-btn" onclick="nextQuestion()">לשאלה הבאה</button>
        </div>

        <div id="scoreScreen" class="score-screen">
            <h2>החידון הסתיים!</h2>
            <p id="finalScoreText" style="font-size: 1.3rem; margin: 20px 0;"></p>
            <button class="restart-btn" onclick="restartQuiz()">התחל מחדש</button>
        </div>
    </main>

    <footer>
        עריכה: מילכה ברקו גרש | בית הספר המשותף חוף הכרמל
    </footer>
</div>

<script>
    const questions = [
        {
            question: "האם זהו גז קל מהאוויר, משמש למילוי בלונים פורחים?",
            answer: "הליום (He)",
            info: "הליום הוא גז אציל קל מאוד ובלתי דליק, ולכן משמש בבטחה למילוי בלונים פורחים וספינות אוויר."
        },
        {
            question: "האם היסוד הוא גז אציל שמייצר הבזקי אור צבעוניים כאשר מעבירים דרכו זרם חשמלי בשלטי תאורה?",
            answer: "ניאון (Ne)",
            info: "ניאון זורח באור אדום-כתמתם אופייני כאשר מעבירים דרכו זרם חשמלי תחת מתח גבוה בשלטי פרסום ותאורה."
        },
        {
            question: "האם זוהי מתכת קלה המשמשת בעיקר בסוללות נטענות?",
            answer: "ליתיום (Li)",
            info: "ליתיום היא המתכת הקלה ביותר בטבע, והיא מרכיב חיוני ומרכזי בסוללות נטענות למכשירים ניידים ורכבים חשמליים."
        },
        {
            question: "האם היסוד הוא מתכת חזקה אך קלה שמתאפיינת בשקיפות מסוימת לקרני רנטגן?",
            answer: "בריליום (Be)",
            info: "בריליום משמש לייצור חלונות עבור מכשירי רנטגן הודות ליכולתו להעביר קרני רנטגן מבלי להיבלע על יתן."
        },
        {
            question: "האם היסוד מעורב בייצור חומרי זכוכית עמידים במיוחד בפני חום?",
            answer: "בור (B)",
            info: "תרכובות בור משמשות לייצור זכוכית מסוג פיירקס, העמידה בפני זעזועים תרמיים ושינויי טמפרטורה קיצוניים."
        },
        {
            question: "האם היסוד מהווה אבן בניין מרכזית בכל היצורים החיים ומופיע בטבע גם כיהלום, גרפיט ופחם?",
            answer: "פחמן (C)",
            info: "פחמן הוא בסיס הכימיה האורגנית ומופיע בטבע בצורות שונות לגמרי (אלוטרופים) כמו יהלום קשה וגרפיט רך."
        },
        {
            question: "האם היסוד הוא גז שמהווה את החלק הארי (הרוב המוחלט) מנפח האוויר באטמוספרה?",
            answer: "חנקן (N)",
            info: "חנקן מהווה כ-78% מנפח האוויר באטמוספרה של כדור הארץ והוא חיוני לבניית חלבונים וחומצות גרעין."
        },
        {
            question: "האם היסוד הוא גז חיוני ביותר הדרוש לנשימה של רוב היצורים החיים ומאפשר תהליכי בעירה?",
            answer: "חמצן (O)",
            info: "חמצן חיוני לתהליך הנשימה התאית ברוב היצורים החיים ומשמש כמחזר מרכזי בתהליכי בעירה."
        },
        {
            question: "האם היסוד הוא גז פעיל מאוד מבחינה כימית שמשולב בדרך כלל במוצרים לשמירה על השיניים?",
            answer: "פלואור (F)",
            info: "תרכובות פלואור (פלואוריד) מוספות למי השתייה ולמשחות שיניים כדי לחזק את אמייל השן ולמנוע עששת."
        },
        {
            question: "האם זוהי מתכת רכה המשמשת כמרכיב במולקולת מלח בישול ומגיבה בעוצמה רבה ופיצוצית במגע ישיר עם מים?",
            answer: "נתרן (Na)",
            info: "נתרן הוא מתכת אלקלית פעילה ביותר המתרכבת עם כלור ליצירת מלח בישול (NaCl), אך במצבה הטהור מגיבה באלימות עם מים."
        },
        {
            question: "האם היסוד הוא מתכת קלה שמתאפיינת בבעירה באור לבן וחזק במיוחד?",
            answer: "מגנזיום (Mg)",
            info: "מגנזיום בוער באור לבן ומסנוור, ולכן שימש בעבר בנורות הבזק (פלאש) לצילום וכיום בזיקוקים די-טכניים."
        },
        {
            question: "האם זוהי מתכת קלה שממנה נוהגים לייצר פחיות שתייה ונייר עטיפה מטאלי שימושי?",
            answer: "אלומיניום (Al)",
            info: "אלומיניום היא מתכת קלה, עמידה בפני קורוזיה וניתנת למחזור אינסופי, ולכן נפוצה בפחיות ובנייר כסף."
        },
        {
            question: "האם היסוד משמש כחומר גלם מוליך-למחצה הבסיסי ביותר לבניית שבבי מחשב?",
            answer: "צורן (Si)",
            info: "צורן (סיליקון) הוא מוליך-למחצה מרכזי בתעשיית האלקטרוניקה ובסיס לייצור מעבדים ושבבים למחשבים."
        },
        {
            question: "האם זהו יסוד החיוני לבניית עצמות ורקמות חיים (כמו DNA ואנרגיה), ומשמש גם לייצור דשנים וגפרורים?",
            answer: "זרחן (P)",
            info: "זרחן חיוני למבנה ה-DNA, לממברנות התאים ולמעגל האנרגיה בגוף (ATP), ומשמש גם בחקלאות ובתעשיית הגפרורים."
        },
        {
            question: "האם היסוד הוא מוצק אל-מתכתי בעל גוון צהוב בולט שקשור לתהליכי טבע ודשנים?",
            answer: "גופרית (S)",
            info: "גופרית היא מוצק צהוב המופיע בסביבת הרי פ געש ומשמש לייצור חומצה גופרתית, דשנים ותרופות."
        },
        {
            question: "האם היסוד הוא גז בעל צבע ירקרק המשמש באופן נפוץ לחיטוי מים בבריכות?",
            answer: "כלור (Cl)",
            info: "כלור הוא גז רעיל וירוק-צהבהב המשמש לחיטוי מי שתייה ומי בריכות שחייה הודות לתכונותיו המחטאות."
        },
        {
            question: "האם זהו גז אציל ויציב מאוד הנמצא באטמוספרה אך כמעט ואינו יוצר תרכובות כימיות?",
            answer: "ארגון (Ar)",
            info: "ארגון הוא גז אציל אינרטי לחלוטין המהווה כמעט אחוז שלם מהאוויר ומשמש למילוי נורות ליבון ולרתכות."
        },
        {
            question: "האם זוהי מתכת רכה ופעילה מאוד, מצויה בשפע בבננות, וחיונית לתפקוד השרירים והעצבים?",
            answer: "אשלגן (K)",
            info: "אשלגן הוא מינרל חיוני לתפקוד תקין של מערכת העצבים והשרירים ונמצא במזונות רבים כמו בננות."
        },
        {
            question: "האם היסוד הוא מתכת חשובה שמככבת בבניית רקמות קשות כמו עצמות ושיניים?",
            answer: "סידן (Ca)",
            info: "סידן הוא אבן בניין חיונית למבנה העצמות והשיניים בגוף האדם, ומשמש גם בתהליכי העברת אותות עצביים."
        },
        {
            question: "האם היסוד הוא מתכת קלה וחזקה שעמידה לחלוטין בפני חלודה ומשמשת בשתלים רפואיים?",
            answer: "טיטניום (Ti)",
            info: "טיטניום משаלב חוזק גבוה עם משקל נמוך ועמידות מוחלטת בפני קורוזיה בגוף האדם, ולכן מעולה לשתלים רפואיים."
        },
        {
            question: "האם היסוד היא מתכת מבריקה ששומרת על פלדה מפני הופעת חלודה (בפלדת אל-חלד)?",
            answer: "כרום (Cr)",
            info: "כרום יוצר שכבת תחמוצת שקופה המגינה על פלדת אל-חלד (אינוקס) מפני חלודה ומעניקה לו ברק."
        },
        {
            question: "האם היסוד הוא מתכת שמוסיפים כדי להקשיח ולחזק סגסוגות פלדה שונות?",
            answer: "מנגן (Mn)",
            info: "מנגן משמש כתוסף חיוני בייצור סגסוגות פלדה כדי לשפר את הקשיחות, החוזק והעמידות שלהן בפני שחיקה."
        },
        {
            question: "האם זוהי מתכת חזקה ונפוצה, נמשכת היטב למגנט, וחיונית להובלת חמצן בגוף באמצעות מערכת הדם?",
            answer: "ברזל (Fe)",
            info: "ברזל הוא מרכזי במולקולת ההמוגלובין בתאי הדם האדומים, האחראית על הובלת חמצן לכל תאי הגוף."
        },
        {
            question: "האם זוהי מתכת הנמשכת למגנט, ומשתתפת בייצור סוללות מתקדמות ופיגמנטים לצבעים כחולים (כמו בקרמיקה ובזכוכית)?",
            answer: "קובלט (Co)",
            info: "קובלט הוא חומר פרומגנטי המשמש בסוללות נטענות מתקדמות וכן כיסוד יוצר פיגמנט כחול עמוק לקרמיקה ולזכוכית."
        },
        {
            question: "האם היסוד הוא מתכת חסינה לקורוזיה שנמשכת למגנט ומשמשת להטבעת מטבעות?",
            answer: "ניקל (Ni)",
            info: "ניקל היא מתכת עמידה מאוד בפני קורוזיה, נמשכת למגנט, ונמצאת בשימוש נרחב במטבעות ובסגסוגות."
        },
        {
            question: "האם היסוד הוא מתכת בעלת גוון כתמתם-אדמדם שמשמשת בהצטיינות להולכת חשמל?",
            answer: "נחושת (Cu)",
            info: "נחושת ידועה במוליכות החשמלית והתרמית הגבוהה שלה ולכן משמשת רבות בחוטי חשמל ובכבלים."
        },
        {
            question: "האם היסוד הוא מתכת שמשמשת בתהליכי ציפוי מגן כדי למנוע מברזל להחליד?",
            answer: "אבץ (Zn)",
            info: "אבץ משמש בתהליך המכונה 'גלוונוניזציה' לציפוי ברזל ופלדה כדי להגן עליהם מפני חלודה וקורוזיה."
        },
        {
            question: "האם זהו חומר הלוגני פעיל מאוד במצב צבירה נוזלי בצבע אדום-חום המשמש בתעשייה (למשל כמעכב בעירה)?",
            answer: "ברום (Br)",
            info: "ברום הוא אחד משני היסודות היחידים הנוזליים בטמפרטורת החדר, בעל צבע אדום-חום, פעיל מאוד ומשמש בין היתר כמעכב בעירה."
        },
        {
            question: "האם היסוד הוא מתכת יקרה שמציגה את מוליכות החשמל הגבוהה ביותר בטבע?",
            answer: "כסף (Ag)",
            info: "כסף מחזיק במוליכות החשמלית והתרמית הגבוהה ביותר מבין כל היסודות בטבע, ומשמש ברכיבים אלקטרוניים רגישים."
        },
        {
            question: "האם היסוד הוא מוצק כהה שעובר ישירות למצב גזי (באמצעות חימום או בתנאים מסוימים) בצבע סגול ומשמש לחיטוי?",
            answer: "יוד (I)",
            info: "יוד עובר תהליך המראה (סובלימציה) ישירות ממוצק לגז סגול, ומשמש בין היתר לחיטוי פצעים ובתהליכים ביולוגיים."
        },
        {
            question: "האם היסוד הוא מתכת עמידה מאוד שמתאפיינת בנקודת ההתכה הגבוהה ביותר מכולן?",
            answer: "טונגסטן (W)",
            info: "לטיטניום וטונגסטן יש נקודות התכה גבוהות, אך טונגסטן מחזיק בנקודת ההתכה הגבוהה ביותר מכל המתכות (מעל 3400 מעלות צלזיוס)."
        },
        {
            question: "האם היסוד הוא מתכת יקרה ואצילה המשמשת כזרז כימי מרכזי וכן בשתלים רפואיים וקוצבי לב?",
            answer: "פלטינה (Pt)",
            info: "פלטינה היא מתכת אצילה ועמידה ביותר שאינה מתחמצנת, ולכן משמשת בממירים קטליטיים, תכשיטים ושתלים רפואיים."
        },
        {
            question: "האם היסוד הוא מתכת יקרה בעלת צבע צהוב מרהיב שאינה מתחמצנת או מאבדת ברק?",
            answer: "זהב (Au)",
            info: "זהב הוא מתכת אצילה שאינה מגיבה עם חמצן או חומצות רובם, ולכן שומרת על הברק והצבע המרהיב שלה לאורך אלפי שנים."
        },
        {
            question: "האם היסוד הוא המתכת היחידה המוכרת לנו שנמצאת במצב נוזלי בתנאי החדר?",
            answer: "כספית (Hg)",
            info: "כספית היא מתכת כבדה המופיעה במצב צבירה נוזלי בטמפרטורת החדר, ושומשה בעבר במדחומים."
        },
        {
            question: "האם היסוד הוא מתכת כבדה וצפופה במיוחד שמשמשת בין השאר לסיכוך נגד קרינה?",
            answer: "עופרת (Pb)",
            info: "עופרת היא מתכת כבדה וצפופה מאוד שבשל צפיפותה הגבוהה מהווה חומר הגנה מעולה מפני קרינה מייננת."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answerLocked = false;
    let shuffledQuestions = [];

    // ערבוב שאלות בכניסה למשחק כדי שהחוויה תהיה דינמית
    function initGame() {
        shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('scoreScreen').style.display = 'none';
        document.getElementById('quizContainer').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        answerLocked = false;
        const qData = shuffledQuestions[currentQuestionIndex];
        
        // עדכון פס התקדמות
        const progress = ((currentQuestionIndex) / shuffledQuestions.length) * 100;
        document.getElementById('progressFill').style.width = `${progress}%`;

        document.getElementById('questionText').innerText = qData.question;
        document.getElementById('infoCard').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';

        // יצירת אפשרויות (התשובה הנכונה + 3 מסיחים אקראיים מתוך שאר היסודות)
        const optionsGrid = document.getElementById('optionsGrid');
        optionsGrid.innerHTML = '';

        let possibleOptions = [qData.answer];
        while (possibleOptions.length < 4) {
            const randomQ = questions[Math.floor(Math.random() * questions.length)];
            if (!possibleOptions.includes(randomQ.answer)) {
                possibleOptions.push(randomQ.answer);
            }
        }
        
        // ערבוב מיקום האפשרויות
        possibleOptions.sort(() => Math.random() - 0.5);

        possibleOptions.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => selectAnswer(btn, option, qData.answer, qData.info);
            optionsGrid.appendChild(btn);
        });
    }

    function selectAnswer(selectedBtn, chosenAnswer, correctAnswer, infoText) {
        if (answerLocked) return;
        answerLocked = true;

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === correctAnswer) {
                btn.classList.add('correct');
            }
        });

        if (chosenAnswer === correctAnswer) {
            score++;
        } else {
            selectedBtn.classList.add('wrong');
        }

        // הצגת כרטיס מידע מעשיר
        const infoCard = document.getElementById('infoCard');
        infoCard.innerHTML = `<strong>העשרה:</strong> ${infoText}`;
        infoCard.style.display = 'block';

        // הצגת כפתור מעבר לשאלה הבאה
        document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById('quizContainer').style.display = 'none';
        const scoreScreen = document.getElementById('scoreScreen');
        scoreScreen.style.display = 'block';
        
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('finalScoreText').innerText = 
            `ענית נכון על ${score} מתוך ${shuffledQuestions.length} שאלות!`;
    }

    function restartQuiz() {
        initGame();
    }

    // הפעלת המשחק בטעינה הראשונה
    window.onload = initGame;
</script>

</body>
</html>
