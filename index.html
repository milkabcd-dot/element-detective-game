<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>היסוד הסודי - משחק כימיה</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#dff6ff,#f7e8ff);
    min-height:100vh;
    margin:0;
    padding:20px;
    text-align:center;
}

.container {
    background:white;
    max-width:850px;
    margin:auto;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px #aaa;
}

h1 {
    color:#5429a8;
    font-size:36px;
}

.subtitle {
    font-size:20px;
    color:#555;
}

.elements {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
    gap:10px;
    margin:25px;
}

.element {
    background:#eef4ff;
    border:2px solid #777;
    border-radius:15px;
    padding:12px;
    font-weight:bold;
}

.symbol {
    font-size:25px;
    color:#5429a8;
}

button {
    font-size:20px;
    padding:12px 35px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    margin:10px;
}

.start {
    background:#5429a8;
    color:white;
}

.yes {
    background:#27ae60;
    color:white;
}

.no {
    background:#e74c3c;
    color:white;
}

.question {
    background:#f5f5ff;
    border-radius:20px;
    padding:30px;
    margin:25px;
    font-size:28px;
    min-height:80px;
}

.hidden {
    display:none;
}

.result {
    background:#fff8dd;
    border:3px solid #f0b400;
    padding:30px;
    border-radius:20px;
    font-size:25px;
}

.info {
    font-size:18px;
    color:#555;
}

</style>

</head>


<body>

<div class="container">

<h1>🔬 היסוד הסודי 🔬</h1>

<p class="subtitle">
בחרו יסוד אחד מהרשימה וזכרו אותו.<br>
המשחק ישאל שאלות וינסה לגלות איזה יסוד בחרתם.
</p>


<div id="intro">

<div id="elements" class="elements"></div>

<button class="start" onclick="startGame()">
התחילו לשחק 🚀
</button>

</div>



<div id="game" class="hidden">

<div class="question" id="question">
השאלה תופיע כאן
</div>

<button class="yes" onclick="answer(true)">
כן ✔
</button>

<button class="no" onclick="answer(false)">
לא ✖
</button>


<p class="info">
מספר יסודות שנשארו:
<span id="count"></span>
</p>

</div>



<div id="result" class="hidden result">

<h2>🎉 מצאתי!</h2>

<p>
היסוד שבחרתם הוא:
</p>

<h1 id="resultName"></h1>

<p id="resultInfo"></p>

<button class="start" onclick="location.reload()">
משחק חדש
</button>

</div>


</div>


<script>
const elements = [

{
name:"חמצן",
symbol:"O",
info:"מרכיב חיוני באוויר ובתהליך הנשימה",
facts:["נשימה","אוויר"]
},

{
name:"חנקן",
symbol:"N",
info:"הגז הנפוץ ביותר באוויר ומשמש גם לייצור דשנים",
facts:["אוויר","דשנים"]
},

{
name:"הליום",
symbol:"He",
info:"גז קל המשמש למילוי בלונים",
facts:["בלונים"]
},

{
name:"ליתיום",
symbol:"Li",
info:"משמש בסוללות נטענות של טלפונים ורכבים חשמליים",
facts:["סוללות"]
},

{
name:"פחמן",
symbol:"C",
info:"מרכיב בסיסי ביצורים חיים. מופיע גם ביהלום ובעיפרון",
facts:["יהלום","חיים"]
},

{
name:"נתרן",
symbol:"Na",
info:"מרכיב חשוב במלח הבישול",
facts:["מלח","גוף"]
},

{
name:"כלור",
symbol:"Cl",
info:"משמש לחיטוי מים ומרכיב במלח הבישול",
facts:["חיטוי","מלח"]
},

{
name:"סידן",
symbol:"Ca",
info:"מרכיב חשוב בעצמות ובשיניים",
facts:["עצמות","שיניים","גוף"]
},

{
name:"ברזל",
symbol:"Fe",
info:"מרכיב חשוב בדם וגם מתכת הנמשכת למגנט",
facts:["דם","מגנט"]
},

{
name:"נחושת",
symbol:"Cu",
info:"משמשת לייצור חוטי חשמל",
facts:["חשמל"]
},

{
name:"צורן",
symbol:"Si",
info:"משמש לייצור שבבים אלקטרוניים וזכוכית",
facts:["שבבים","זכוכית"]
},

{
name:"זהב",
symbol:"Au",
info:"מתכת יקרה המשמשת בתכשיטים",
facts:["תכשיטים"]
},

{
name:"כסף",
symbol:"Ag",
info:"מתכת המשמשת בתכשיטים וברכיבים חשמליים",
facts:["תכשיטים"]
},

{
name:"מגנזיום",
symbol:"Mg",
info:"משמש בזיקוקים ובסגסוגות קלות",
facts:["זיקוקים"]
},

{
name:"אלומיניום",
symbol:"Al",
info:"משמש לייצור פחיות ונייר כסף",
facts:["פחיות"]
}

];


// שאלות ברורות לתלמידים
const questions = [

{
text:"האם היסוד הוא מרכיב חשוב בעצמות ובשיניים?",
fact:"עצמות"
},

{
text:"האם היסוד קשור לדם שלנו?",
fact:"דם"
},

{
text:"האם משתמשים ביסוד לייצור חוטי חשמל?",
fact:"חשמל"
},

{
text:"האם משתמשים ביסוד בסוללות נטענות?",
fact:"סוללות"
},

{
text:"האם היסוד נמצא באוויר שאנו נושמים?",
fact:"אוויר"
},

{
text:"האם היסוד משמש למילוי בלונים?",
fact:"בלונים"
},

{
text:"האם משתמשים ביסוד לייצור תכשיטים?",
fact:"תכשיטים"
},

{
text:"האם היסוד קשור למלח הבישול?",
fact:"מלח"
},

{
text:"האם משתמשים בו לחיטוי מים?",
fact:"חיטוי"
},

{
text:"האם משתמשים בו בייצור שבבים אלקטרוניים?",
fact:"שבבים"
}

];


let remaining=[];
let currentQuestion=0;



function showElements(){

let box=document.getElementById("elements");

elements.forEach(e=>{

box.innerHTML +=

`
<div class="element">

<div class="symbol">
${e.symbol}
</div>

${e.name}

</div>
`;

});

}



function startGame(){

remaining=[...elements];

document.getElementById("intro").classList.add("hidden");

document.getElementById("game").classList.remove("hidden");

currentQuestion=0;

askQuestion();

}



function askQuestion(){

document.getElementById("count").innerHTML=
remaining.length;


if(remaining.length==1){

showResult(remaining[0]);
return;

}


if(currentQuestion>=questions.length){

showResult(remaining[0]);
return;

}


document.getElementById("question").innerHTML=
questions[currentQuestion].text;

}



function answer(isYes){

let fact=questions[currentQuestion].fact;


remaining =
remaining.filter(e=>{

let has=e.facts.includes(fact);

return isYes ? has : !has;

});


currentQuestion++;

askQuestion();

}



function showResult(element){

document.getElementById("game").classList.add("hidden");

document.getElementById("result").classList.remove("hidden");


document.getElementById("resultName").innerHTML =
element.name+" ("+element.symbol+")";


document.getElementById("resultInfo").innerHTML =
element.info;

}



showElements();

</script>

</body>
</html>
