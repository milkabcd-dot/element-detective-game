let remaining = [];
let currentQuestion = null;


// שאלות המשחק
const questions = [

{
text:"האם היסוד הוא גז בטמפרטורת החדר?",
check:e=>e.features.gas
},

{
text:"האם היסוד הוא מתכת?",
check:e=>e.features.metal
},

{
text:"האם היסוד חשוב בגוף האדם?",
check:e=>e.features.body
},

{
text:"האם משתמשים ביסוד בטכנולוגיה או בתעשייה?",
check:e=>e.features.technology
},

{
text:"האם היסוד נמשך למגנט?",
check:e=>e.features.magnet
}

];


// הצגת רשימת יסודות במסך הפתיחה

function createElementList(){

let box=document.getElementById("elementsList");

box.innerHTML="";

elements.forEach(e=>{

let div=document.createElement("div");

div.className="element";

div.innerHTML=
`
<div class="symbol">${e.symbol}</div>
<div class="name">${e.name}</div>
<div>מספר אטומי: ${e.number}</div>
`;

box.appendChild(div);

});

}



// פתיחת חלון המידע

function showInfo(){

let cards=document.getElementById("cards");

cards.innerHTML="";


elements.forEach(e=>{


cards.innerHTML +=

`

<div class="card">

<h2>${e.name} (${e.symbol})</h2>

<p><b>מספר אטומי:</b> ${e.number}</p>

<p>${e.summary}</p>

<h3>עוד מידע:</h3>

<p>
${e.extra.join("<br>")}
</p>


</div>


`;

});


document.getElementById("modal").style.display="flex";

}



// סגירת מידע

function closeInfo(){

document.getElementById("modal").style.display="none";

}



// התחלת משחק

function startGame(){

remaining=[...elements];

document.getElementById("start").classList.remove("active");

document.getElementById("game").classList.add("active");

askQuestion();

}



// בחירת שאלה

function askQuestion(){

if(remaining.length===1){

showResult(remaining[0]);

return;

}


// בחירה אקראית של שאלה

currentQuestion=
questions[Math.floor(Math.random()*questions.length)];


document.getElementById("question").innerHTML=
currentQuestion.text;


document.getElementById("remaining").innerHTML=
"נשארו אפשרויות: "+remaining.length+" יסודות";

}



// תשובת תלמיד

function answer(value){


remaining = remaining.filter(e=>

currentQuestion.check(e)===value

);


if(remaining.length===0){

alert("כנראה הייתה תשובה לא נכונה. מתחילים מחדש.");

resetGame();

return;

}


askQuestion();


}



// הצגת תוצאה

function showResult(e){


document.getElementById("game").classList.remove("active");

document.getElementById("result").classList.add("active");


document.getElementById("found").innerHTML=
`
${e.name} (${e.symbol})
`;


document.getElementById("foundInfo").innerHTML=

`

<p>${e.summary}</p>

<h3>תכונות נוספות:</h3>

<p>
${e.extra.join("<br>")}
</p>

`;

}



// משחק חדש

function resetGame(){

document.getElementById("result").classList.remove("active");

document.getElementById("game").classList.remove("active");

document.getElementById("start").classList.add("active");

}



// הפעלה ראשונית

createElementList();
