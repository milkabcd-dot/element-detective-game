<html lang="he" dir="rtl">

<title>היסוד הסודי - משחק כימיה</title>

<style>

*{
 box-sizing:border-box;
}

body{
 font-family:Arial,"Segoe UI",sans-serif;
 background:linear-gradient(135deg,#4b1fa8,#17a2b8);
 min-height:100vh;
 margin:0;
 padding:20px;
 direction:rtl;
}

.container{
 max-width:900px;
 margin:auto;
 background:white;
 border-radius:25px;
 padding:30px;
 box-shadow:0 10px 30px #333;
}

h1{
 text-align:center;
 color:#5420a8;
 font-size:38px;
}

.subtitle{
 text-align:center;
 color:#555;
 font-size:20px;
}

.screen{
 display:none;
}

.active{
 display:block;
}

button{
 cursor:pointer;
}

.big-btn{
 display:block;
 margin:25px auto;
 padding:15px 40px;
 border:none;
 border-radius:30px;
 background:#5420a8;
 color:white;
 font-size:22px;
 font-weight:bold;
}

.big-btn:hover{
 background:#17a2b8;
}


.elements-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
 gap:10px;
 margin-top:20px;
}


.element{
 border:2px solid #ddd;
 border-radius:15px;
 padding:10px;
 text-align:center;
 background:#fafafa;
}

.symbol{
 font-size:28px;
 font-weight:bold;
 color:#5420a8;
}

.name{
 font-weight:bold;
}


.info-btn{
 display:block;
 margin:15px auto;
 padding:10px 25px;
 border-radius:25px;
 border:2px solid #5420a8;
 background:white;
 color:#5420a8;
 font-size:18px;
}


.question-box{
 background:#eef7ff;
 border-radius:20px;
 padding:30px;
 text-align:center;
 margin:20px 0;
}

.question{
 font-size:25px;
 font-weight:bold;
}


.answer{
 padding:15px 40px;
 border-radius:30px;
 border:none;
 margin:10px;
 font-size:20px;
 color:white;
}

.yes{
 background:#27ae60;
}

.no{
 background:#e74c3c;
}


.card{
 background:#fff8e8;
 border-radius:20px;
 padding:25px;
 margin-top:20px;
}

.card h2{
 color:#5420a8;
}


.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:#0008;
 justify-content:center;
 align-items:center;
}


.modal-content{
 background:white;
 width:90%;
 max-width:700px;
 max-height:80%;
 overflow:auto;
 border-radius:20px;
 padding:25px;
}


.close{
 float:left;
 background:#e74c3c;
 color:white;
 border:none;
 border-radius:50%;
 width:35px;
 height:35px;
}


footer{
 text-align:center;
 margin-top:20px;
 color:#777;
}

</style>

</head>


<body>


<div class="container">


<h1>🔬 היסוד הסודי 🔬</h1>

<p class="subtitle">
בחרו יסוד בלב, קראו עליו בכרטיס המידע,
והמחשב ינסה לגלות איזה יסוד בחרתם
</p>


<!-- מסך פתיחה -->

<div id="start" class="screen active">


<button class="info-btn" onclick="showInfo()">
📋 רשימת יסודות ומידע
</button>


<div id="elementsList" class="elements-grid"></div>


<button class="big-btn" onclick="startGame()">
🚀 התחילו לשחק
</button>


</div>



<!-- מסך משחק -->


<div id="game" class="screen">


<div class="question-box">

<div id="question" class="question">
</div>


<button class="answer yes" onclick="answer(true)">
כן
</button>


<button class="answer no" onclick="answer(false)">
לא
</button>

</div>


<div id="remaining"></div>


</div>




<!-- מסך תוצאה -->


<div id="result" class="screen">


<div class="card">

<h2>🎉 מצאתי את היסוד!</h2>

<h1 id="found"></h1>

<div id="foundInfo"></div>


<button class="big-btn" onclick="resetGame()">
משחק חדש
</button>


</div>


</div>


<footer>
עריכה: מילכה ברקו גרש | בית הספר המשותף חוף הכרמל
</footer>


</div>



<!-- חלון מידע -->


<div id="modal" class="modal">

<div class="modal-content">

<button class="close" onclick="closeInfo()">X</button>

<h2>
כרטיסי מידע על היסודות
</h2>


<div id="cards"></div>


</div>

</div>

// משתני משחק

let remaining = [];
let currentQuestion = null;
let asked = [];

// בחירת השאלה הבאה בהתאם להיררכיה הנוקשה של השאלות הראשונות

function getNextQuestion(){

// שלב 1: מעבר סדרתי על ארבע השאלות הראשונות שנקבעו מראש אם טרם נשאלו
for(let q of fixedInitialQuestions){
if(!asked.includes(q.text)){
let yesCount = remaining.filter(e => q.checker(e)).length;
let noCount = remaining.length - yesCount;
// נציג את השאלה רק אם היא רלוונטית לקבוצה הנוכחית (כלומר מחלקת אותה או לפחות רלוונטית לחלק מהאפשרויות)
if(yesCount > 0 && noCount > 0){
return q;
}
}
}

// שלב 2: שאר השאלות (כלליות ופרטניות)
let available = [...generalQuestions, ...specificQuestions].filter(q => !asked.includes(q.text));

let best = null;
let bestDiff = Infinity;

available.forEach(q => {
let yesCount = remaining.filter(e => q.checker(e)).length;
let noCount = remaining.length - yesCount;

if(yesCount > 0 && noCount > 0){
let diff = Math.abs(yesCount - noCount);
if(diff < bestDiff){
bestDiff = diff;
best = q;
}
}
});

if(!best && available.length > 0){
best = available[0];
}

return best;

}


// התחלת משחק

function startGame(){

remaining = [...elements];
asked = [];

document.getElementById("start").classList.remove("active");
document.getElementById("game").classList.add("active");

showQuestion();

}


// הצגת שאלה

function showQuestion(){

if(remaining.length === 1){
showResult(remaining[0]);
return;
}

let q = getNextQuestion();

if(!q){
showResult(remaining[0]);
return;
}

currentQuestion = q;
asked.push(q.text);

document.getElementById("question").innerHTML = q.text;
document.getElementById("remaining").innerHTML = "נשארו " + remaining.length + " אפשרויות";

}


// תשובת כן/לא

function answer(ans){

remaining = remaining.filter(e => currentQuestion.checker(e) === ans);
showQuestion();

}


// הצגת כרטיס היסוד הסופי

function showResult(element){

document.getElementById("game").classList.remove("active");
document.getElementById("result").classList.add("active");

document.getElementById("found").innerHTML = `${element.name} (${element.symbol})`;

document.getElementById("foundInfo").innerHTML = `
<p><b>מספר אטומי:</b> ${element.number}</p>
<p><b>מצב צבירה בטמפרטורת החדר:</b> ${element.stateHeb}</p>
<p>${element.summary}</p>
<h3>מידע נוסף:</h3>
<p>${element.extra.join("<br>")}</p>
<p style="margin-top:20px;font-weight:bold;">
עריכה: מילכה ברקו גרש | בית הספר המשותף חוף הכרמל
</p>
`;

}


// משחק חדש

function resetGame(){

document.getElementById("result").classList.remove("active");
document.getElementById("game").classList.remove("active");
document.getElementById("start").classList.add("active");

}


// הצגת רשימת היסודות

function createElementList(){

let box = document.getElementById("elementsList");
if(!box) return;
box.innerHTML = "";

elements.forEach(e => {
let item = document.createElement("div");
item.className = "element";
item.innerHTML = `<strong>${e.symbol}</strong><br>${e.name}<br><small style="color:#555;">(${e.stateHeb})</small>`;
box.appendChild(item);
});

}


// פתיחת כרטיסי מידע

function showInfo(){

let cards = document.getElementById("cards");
cards.innerHTML = "";

elements.forEach(e => {
cards.innerHTML += `
<div class="card">
<h2>${e.name} (${e.symbol})</h2>
<p><b>מצב צבירה בטמפרטורת החדר:</b> ${e.stateHeb}</p>
<p>${e.summary}</p>
<p>${e.extra.join("<br>")}</p>
</div>
`;
});

document.getElementById("modal").style.display = "flex";

}


function closeInfo(){
document.getElementById("modal").style.display = "none";
}


// אתחול
createElementList();

</script>

</body>
</html>
