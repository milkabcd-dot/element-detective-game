<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון היסודות הכימיים</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-sizing: border-box;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .quiz-title {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin: 0;
        }

        .progress-indicator {
            font-size: 1rem;
            color: #7f8c8d;
            font-weight: bold;
        }

        .question-box {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
            color: var(--primary-color);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 1.05rem;
            text-align: right;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: var(--text-color);
        }

        .option-btn:hover:not(:disabled) {
            background-color: #edf2f7;
            border-color: var(--accent-color);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: #27ae60 !important;
        }

        .option-btn.incorrect {
            background-color: var(--error-color) !important;
            color: white;
            border-color: #c0392b !important;
        }

        .feedback-box {
            background-color: #ebf5fb;
            border-right: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.4;
            display: none;
        }

        .action-footer {
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 25px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        .score-screen {
            text-align: center;
            padding: 20px 0;
            display: none;
        }

        .score-screen h2 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .score-screen p {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .restart-btn:hover {
            background-color: #1a252f;
        }

        .quiz-credits {
            margin-top: 35px;
            text-align: center;
            font-size: 0.85rem;
            color: #95a5a6;
            border-top: 1px solid #eaeaea;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <h1 class="quiz-title">חידון היסודות הכימיים</h1>
        <div class="progress-indicator" id="progressIndicator">שאלה 1 מתוך 35</div>
    </div>

    <div id="quizMainContent">
        <div class="question-box" id="questionBox">טוען שאלה...</div>
        
        <div class="options-list" id="optionsList">
            <!-- אפשרויות יטענו לכאן -->
        </div>

        <div class="feedback-box" id="feedbackBox"></div>

        <div class="action-footer">
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">לשאלה הבאה</button>
        </div>
    </div>

    <div class="score-screen" id="scoreScreen">
        <h2>החידון הסתיים!</h2>
        <p id="scoreText"></p>
        <button class="restart-btn" onclick="restartQuiz()">התחל מחדש</button>
    </div>

    <div class="quiz-credits">
        עריכה: מילכה ברקו גרש | בית הספר המשותף חוף הכרמל
    </div>
</div>

<script>
    const quizData = [
        {

        },
        {
            question: "האם היסוד הוא גז אציל שמייצר הבזקי אור צבעוניים כאשר מעבירים דרכו זרם חשמלי בשלטי תאורה?",
            options: ["הליום (He)", "ניאון (Ne)", "ארגון (Ar)", "כלור (Cl)"],
            correct: 1,
            info: "ניאון זורח באור אדום-כתמתם אופייני כאשר מעבירים דרכו זרם חשמלי תחת מתח גבוה בשלטי פרסום ותאורה."
        },
        {
            question: "האם זוהי מתכת קלה המשמשת בעיקר בסוללות נטענות?",
            options: ["נתרן (Na)", "מגנזיום (Mg)", "ליתיום (Li)", "אלומיניום (Al)"],

        },
        {
            question: "האם היסוד הוא מתכת חזקה אך קלה שמתאפיינת בשקיפות מסוימת לקרני רנטגן?",
            options: ["טיטניום (Ti)", "בריליום (Be)", "מגנזיום (Mg)", "אלומיניום (Al)"],

        },

            question: "האם היסוד מעורב בייצור חומרי זכוכית עמידים במיוחד בפני חום?",

        {
            question: "האם היסוד הוא גז חיוני ביותר הדרוש לנשימה של רוב היצורים החיים ומאפשר תהליכי בעירה?",

        },
        {
            question: "האם היסוד הוא גז פעיל מאוד מבחינה כימית שמשולב בדרך כלל במוצרים לשמירה על השיניים?",

        },
        {

            correct: 1,
            info: "זרחן חיוני למבנה ה-DNA, לממברנות התאים ולמעגל האנרגיה בגוף (ATP), ומשמש גם בחקלאות ובתעשיית הגפרורים."

        {
            question: "האם זהו גז אציל ויציב מאוד הנמצא באטמוספרה אך כמעט ואינו יוצר תרכובות כימיות?",

            options: ["כלור (Cl)", "ברום (Br)", "יוד (I)", "כספית (Hg)"],
            correct: 1,
            info: "ברום הוא אחד משני היסודות היחידים הנוזליים בטמפרטורת החדר, בעל צבע אדום-חום, פעיל מאוד ומשמש בין היתר כמעכב בעירה."
        },
        {
            question: "האם היסוד הוא מתכת יקרה שמציגה את מוליכות החשמל הגבוהה ביותר בטבע?",
            options: ["זהב (Au)", "פלטינה (Pt)", "כסף (Ag)", "נחושת (Cu)"],
            correct: 2,
            info: "כסף מחזיק במוליכות החשמלית והתרמית הגבוהה ביותר מבין כל היסודות בטבע, ומשמש ברכיבים אלקטרוניים רגישים."
        },
        {
            question: "האם היסוד הוא מוצק כהה שעובר ישירות למצב גזי (באמצעות חימום או בתנאים מסוימים) בצבע סגול ומשמש לחיטוי?",
            options: ["ברום (Br)", "יוד (I)", "גופרית (S)", "זרחן (P)"],
            correct: 1,
            info: "יוד עובר תהליך המראה (סובלימציה) ישירות ממוצק לגז סגול, ומשמש בין היתר לחיטוי פצעים ובתהליכים ביולוגיים."
        },
        {
            question: "האם היסוד הוא מתכת עמידה מאוד שמתאפיינת בנקודת ההתכה הגבוהה ביותר מכולן?",
            options: ["טיטניום (Ti)", "טונגסטן (W)", "פלטינה (Pt)", "זהב (Au)"],
            correct: 1,
            info: "לטיטניום וטונגסטן יש נקודות התכה גבוהות, אך טונגסטן מחזיק בנקודת ההתכה הגבוהה ביותר מכל המתכות (מעל 3400 מעלות צלזיוס)."
        },
        {
            question: "האם היסוד הוא מתכת יקרה ואצילה המשמשת כזרז כימי מרכזי וכן בשתלים רפואיים וקוצבי לב?",
            options: ["זהב (Au)", "פלטינה (Pt)", "כסף (Ag)", "כספית (Hg)"],
            correct: 1,
            info: "פלטינה היא מתכת אצילה ועמידה ביותר שאינה מתחמצנת, ולכן משמשת בממירים קטליטיים, תכשיטים ושתלים רפואיים."
        },
        {
            question: "האם היסוד הוא מתכת יקרה בעלת צבע צהוב מרהיב שאינה מתחמצנת או מאבדת ברק?",
            options: ["כסף (Ag)", "פלטינה (Pt)", "זהב (Au)", "נחושת (Cu)"],
            correct: 2,
            info: "זהב הוא מתכת אצילה שאינה מגיבה עם חמצן או חומצות רובם, ולכן שומרת על הברק והצבע המרהיב שלה לאורך אלפי שנים."
        },
        {
            question: "האם היסוד הוא המתכת היחידה המוכרת לנו שנמצאת במצב נוזלי בתנאי החדר?",
            options: ["ברום (Br)", "כספית (Hg)", "גاليوم (Ga)", "עופרת (Pb)"],
            correct: 1,
            info: "כספית היא מתכת כבדה המופיעה במצב צבירה נוזלי בטמפרטורת החדר, ושומשה בעבר במדחומים."
        },
        {
            question: "האם היסוד הוא מתכת כבדה וצפופה במיוחד שמשמשת בין השאר לסיכוך נגד קרינה?",
            options: ["ברזל (Fe)", "כספית (Hg)", "עופרת (Pb)", "ניקל (Ni)"],
            correct: 2,
            info: "עופרת היא מתכת כבדה וצפופה מאוד שבשל צפיפותה הגבוהה מהווה חומר הגנה מעולה מפני קרינה מייננת."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const currentQ = quizData[currentQuestionIndex];
        
        document.getElementById('progressIndicator').innerText = `שאלה ${currentQuestionIndex + 1} מתוך ${quizData.length}`;
        document.getElementById('questionBox').innerText = currentQ.question;
        
        const optionsList = document.getElementById('optionsList');
        optionsList.innerHTML = '';
        
        currentQ.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => selectOption(index, btn);
            optionsList.appendChild(btn);
        });

        document.getElementById('feedbackBox').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
    }

    function selectOption(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;

        const currentQ = quizData[currentQuestionIndex];
        const optionButtons = document.querySelectorAll('.option-btn');

        if (selectedIndex === currentQ.correct) {
            btnElement.classList.add('correct');
            score++;
        } else {
            btnElement.classList.add('incorrect');
            optionButtons[currentQ.correct].classList.add('correct');
        }

        optionButtons.forEach(btn => btn.disabled = true);

        const feedbackBox = document.getElementById('feedbackBox');
        feedbackBox.innerHTML = `<strong>העשרה:</strong> ${currentQ.info}`;
        feedbackBox.style.display = 'block';

        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById('quizMainContent').style.display = 'none';
        const scoreScreen = document.getElementById('scoreScreen');
        scoreScreen.style.display = 'block';
        
        document.getElementById('scoreText').innerText = `ענית נכון על ${score} מתוך ${quizData.length} שאלות.`;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('scoreScreen').style.display = 'none';
        document.getElementById('quizMainContent').style.display = 'block';
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</html>
